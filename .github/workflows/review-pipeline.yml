name: Review Pipeline

# Unified review -> gate -> act layer (event-driven, no cron).
#
#   Layer 1 REVIEW : CodeRabbit (.coderabbit.yaml) + Gemini Code Assist (.gemini/)
#                    comment on the PR. Cross-vendor, advisory only.
#   Layer 2 GATE   : All observed check runs and commit statuses for the authoritative
#                    PR head SHA must be green across first- and third-party apps.
#                    This is the merge gate — there is no human merge gate.
#   Layer 3 ACT    : this workflow. When every CI check on a PR head is green it
#                    squash-merges and deletes the branch; when one is red it raises
#                    exactly ONE tracking issue (BROKE or THREAT) and does nothing else.
#
# NOISE policy: silent on routine success; a single sticky PR comment carries running
# status; alert ONLY on real BROKE (CI red) or THREAT (security scanner red);
# a final "merged" status when it lands. No per-step pings.
#
# Dynamic gating: no hardcoded check names. REST Checks, GraphQL status rollup,
# Actions workflow runs, and commit statuses are bounded alternate evidence sources.
# The complete check set must be stable across two observations before merge. Repos
# with no visible CI evidence get review-only (no auto-merge), and stacked PR bases
# are never eligible for this autonomous merge lane.
#
# Fires on named workflow completion plus third-party check-suite and legacy-status
# completion. The merge request is bound to the verified head SHA.

# workflow_run supplies metadata only; the job checks out and executes the pinned
# adapter from the trusted default branch and binds mutation to a fresh PR head SHA.
on: # zizmor: ignore[dangerous-triggers] reviewed privileged metadata trigger
  workflow_run:
    workflows: ["CodeQL Advanced", "PromptOS Verify"]
    types: [completed]
  check_suite:
    types: [completed]
  status:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      branch:
        description: Head branch to evaluate (manual act run)
        required: false

permissions: {}

concurrency:
  group: review-pipeline-${{ github.event.workflow_run.head_branch || github.event.check_suite.head_branch || github.event.pull_request.number || github.event.inputs.branch || github.event.sha || github.run_id }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # ACT: gate a PR head -> merge on all-green, or raise one BROKE/THREAT issue.
  # ---------------------------------------------------------------------------
  act:
    name: gate -> merge | alert
    permissions:
      actions: read # List workflow runs for the authoritative head SHA.
      checks: read # Read first- and third-party check runs.
      contents: write # Perform a SHA-bound merge and delete its merged branch.
      issues: write # Maintain one sticky status and one deduplicated alert issue.
      pull-requests: write # Read and merge the selected pull request.
      statuses: read # Read legacy commit-status contexts.
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.name != 'Review Pipeline') ||
      (github.event_name == 'check_suite' && github.event.check_suite.app.slug != 'github-actions') ||
      github.event_name == 'status' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # workflow_run is privileged: execute only the adapter from the trusted default
      # branch, never code from the triggering pull-request head.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { runGitHubReviewPipeline } = require(`${process.env.GITHUB_WORKSPACE}/tools/review-pipeline-github.cjs`);
            await runGitHubReviewPipeline({ github, context, core });

  # ---------------------------------------------------------------------------
  # PROMOTE: maintenance -> master/main automatically on green (no human gate).
  # Only runs if the repo has a maintenance branch.
  # ---------------------------------------------------------------------------
  promote:
    name: promote maintenance -> master
    permissions:
      contents: write # Merge the green maintenance branch into the default branch.
      pull-requests: write # Create and merge the promotion pull request.
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name != 'Review Pipeline' &&
      github.event.workflow_run.head_branch == 'maintenance' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const testedSha = context.payload.workflow_run.head_sha;
            // Detect the working default branch (master or main).
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const base = repoInfo.data.default_branch;
            const head = "maintenance";
            const maintenanceRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${head}` });
            if (maintenanceRef.data.object.sha !== testedSha) {
              core.warning(`Stale maintenance event: tested ${testedSha}, current ${maintenanceRef.data.object.sha}. No promotion attempted.`);
              return;
            }
            // Only promote if maintenance is actually ahead.
            const cmp = await github.rest.repos.compareCommitsWithBasehead({
              owner, repo, basehead: `${base}...${testedSha}`,
            });
            if (cmp.data.status === "identical" || cmp.data.ahead_by === 0) {
              core.info(`maintenance not ahead of ${base}; nothing to promote.`);
              return;
            }
            let pr = (await github.rest.pulls.list({ owner, repo, state: "open", head: `${owner}:${head}`, base }))
              .data[0];
            if (!pr) {
              pr = (await github.rest.pulls.create({
                owner, repo, base, head,
                title: `promote: maintenance -> ${base} (auto, green)`,
                body: "Automated promotion. CI is green on `maintenance`; no human merge gate.",
              })).data;
            }
            pr = (await github.rest.pulls.get({ owner, repo, pull_number: pr.number })).data;
            if (pr.head.sha !== testedSha) {
              core.warning(`Promotion PR #${pr.number} moved from tested SHA ${testedSha} to ${pr.head.sha}. No merge attempted.`);
              return;
            }
            try {
              const merged = (await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: "merge",
                sha: testedSha,
              })).data;
              if (!merged.merged) {
                core.warning(`Promotion merge rejected: ${merged.message || 'unknown reason'}`);
                return;
              }
              const receipt = (await github.rest.pulls.get({ owner, repo, pull_number: pr.number })).data;
              if (receipt.state !== "closed" || !receipt.merged_at || receipt.merge_commit_sha !== merged.sha) {
                core.warning(`Promotion merged but receipt verification failed for PR #${pr.number}; expected ${merged.sha}, observed ${receipt.merge_commit_sha || 'none'}.`);
                return;
              }
              core.info(`Promoted tested maintenance SHA ${testedSha} -> ${base} via PR #${pr.number}; merge ${merged.sha}.`);
            } catch (e) {
              core.warning(`Promotion merge failed: ${e.message}`);
            }

  # ---------------------------------------------------------------------------
  # PRUNE: delete dead branches. Event-driven (PR close + manual), never cron.
  # ---------------------------------------------------------------------------
  prune:
    name: prune merged branches
    permissions:
      contents: write # Delete a merged branch reference.
      pull-requests: read # Keep branches with open pull requests.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const PROTECTED = new Set(["master", "main", "maintenance"]);
            const SWEEP = /^(feat|fix|chore|auto\/repair|docs|refactor|test|release|hotfix)\//;

            // 1) Delete the just-merged PR's head branch.
            if (context.eventName === "pull_request") {
              const b = context.payload.pull_request.head.ref;
              const expectedSha = context.payload.pull_request.head.sha;
              const sameRepo = context.payload.pull_request.head.repo &&
                               context.payload.pull_request.head.repo.full_name === `${owner}/${repo}`;
              if (sameRepo && !PROTECTED.has(b)) {
                try {
                  const current = (await github.rest.git.getRef({ owner, repo, ref: `heads/${b}` })).data.object.sha;
                  if (current !== expectedSha) {
                    core.info(`preserved ${b}: moved from merged ${expectedSha} to ${current}`);
                    return;
                  }
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${b}` });
                  core.info(`deleted ${b} at merged SHA ${expectedSha}`);
                }
                catch (e) { core.info(`skip ${b}: ${e.message}`); }
              }
              return;
            }

            // 2) Manual sweep: delete sweepable branches already merged into default.
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            const branches = await github.paginate(github.rest.repos.listBranches, { owner, repo, per_page: 100 });
            const openPRs = await github.paginate(github.rest.pulls.list, { owner, repo, state: "open", per_page: 100 });
            const openHeads = new Set(openPRs.map(p => p.head.ref));
            let deleted = [];
            for (const br of branches) {
              const name = br.name;
              if (PROTECTED.has(name) || !SWEEP.test(name) || openHeads.has(name)) continue;
              const observedSha = br.commit.sha;
              const cmp = await github.rest.repos.compareCommitsWithBasehead({ owner, repo, basehead: `${defaultBranch}...${observedSha}` });
              if (cmp.data.status === "behind" || cmp.data.status === "identical") {
                try {
                  const current = (await github.rest.git.getRef({ owner, repo, ref: `heads/${name}` })).data.object.sha;
                  if (current !== observedSha) {
                    core.info(`preserved ${name}: moved from observed ${observedSha} to ${current}`);
                    continue;
                  }
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${name}` });
                  deleted.push(name);
                }
                catch (e) { core.info(`skip ${name}: ${e.message}`); }
              }
            }
            core.info(deleted.length ? `pruned: ${deleted.join(", ")}` : "nothing to prune.");
