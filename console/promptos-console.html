<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PromptOS Console</title>
<style>
/* Eagle console-tokens.css — the SINGLE source of type-scale truth for render-verify consoles.
 * Inlined at BUILD time into each single-file console (the zero-network invariant is preserved —
 * nothing is fetched at view time). Change a number here -> rebuild -> every console updates, so
 * the scale cannot silently diverge between consoles (the drift that needed a 3x manual fix).
 * Floor measured from anthropic.com 2026-06-25; ENFORCED by measure_scale.py --gate, which each
 * builder runs as its last step (build fails below floor). See feedback_measure_scale_not_just_color.
 *
 * Marker contract: a builder inlines this by replacing the line `/* __SCALE_TOKENS__ *​/` in its
 * <style> with this file's contents (or, for a Python generator, str.replace the same token). */
:root {
  /* Type scale (rem; ×16 = px). --text-base / --text-floor are the two the gate checks. */
  --text-base:  1.125rem;   /* 18px — body floor for consoles (anthropic live ~20px)        */
  --text-floor: 0.75rem;    /* 12px — smallest visible text, HARD floor (== --fs-xs)         */
  --fs-xs:      0.75rem;    /* 12px — badges, captions, meta (the floor)                     */
  --fs-sm:      0.875rem;   /* 14px — secondary labels                                       */
  --fs-md:      1rem;       /* 16px — content / summaries                                    */
  --fs-lg:      1.125rem;   /* 18px — emphasized body                                        */
  --fs-xl:      1.4rem;     /* ~22px — card titles / section heads                           */
  --fs-2xl:     1.9rem;     /* ~30px — hero / focal heading                                  */
  --leading-body:  1.5;
  --leading-tight: 1.2;
}

  :root{
    --clay:#d97757;--accent:#c6613f;
    --ivory-light:#faf9f5;--ivory-medium:#f0eee6;--ivory-dark:#e8e6dc;
    --slate-dark:#141413;--slate-medium:#3d3d3a;--slate-light:#5e5d59;
    --cloud-medium:#b0aea5;--cloud-dark:#87867f;--cactus:#bcd1ca;
    --bg:var(--ivory-light);--surface:#ffffff;--surface-2:var(--ivory-medium);
    --text:var(--slate-dark);--text-2:var(--slate-light);--border:#1414131a;
    --accent-c:var(--clay);--accent-h:var(--accent);--accent-text:#b8512f;--badge-bg:#bcd1ca;--badge-fg:#1c3a30;
    --shadow:0 6px 24px #14141322;
    --font-sans:"Anthropic Sans","Poppins",Arial,sans-serif;
    --font-serif:"Anthropic Serif","Lora",Georgia,serif;
    --font-mono:"Anthropic Mono","Jetbrains Mono",ui-monospace,monospace;
    --radius:.5rem;--maxw:80rem;
    --pad-card:1rem 1.1rem;--gap:1rem;--row:.5rem;
  }
  html[data-theme="dark"]{
    --bg:var(--slate-dark);--surface:#1e1e1c;--surface-2:#27261f;
    --text:var(--ivory-light);--text-2:var(--cloud-medium);--border:#faf9f51a;
    --accent-c:#e08a6a;--accent-h:#f0a583;--accent-text:#e08a6a;--badge-bg:#2f4a40;--badge-fg:#bcd1ca;--shadow:0 6px 28px #00000066;
  }
  @media (prefers-color-scheme: dark){
    html:not([data-theme="light"]){
      --bg:var(--slate-dark);--surface:#1e1e1c;--surface-2:#27261f;
      --text:var(--ivory-light);--text-2:var(--cloud-medium);--border:#faf9f51a;
      --accent-c:#e08a6a;--accent-h:#f0a583;--accent-text:#e08a6a;--badge-bg:#2f4a40;--badge-fg:#bcd1ca;--shadow:0 6px 28px #00000066;
    }
  }
  html[data-density="compact"]{--pad-card:.7rem .8rem;--gap:.7rem;--row:.3rem}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-serif);font-size:var(--text-base);line-height:1.5;
    -webkit-font-smoothing:antialiased;transition:background .2s,color .2s;overflow-x:hidden}
  .sans{font-family:var(--font-sans)} .mono{font-family:var(--font-mono)}
  a{color:var(--accent-text);text-decoration:none} a:hover{color:var(--accent-h)}
  :focus-visible{outline:2px solid var(--accent-text);outline-offset:2px;border-radius:3px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  header{position:sticky;top:0;z-index:5;background:var(--bg);padding:1rem 1.5rem;border-bottom:1px solid transparent;transition:border-color .2s}
  header.stuck{border-bottom-color:var(--border)}
  .mast{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  .brand{font-family:var(--font-sans);font-weight:800;font-size:1.15rem;letter-spacing:.01em}
  .brand b{color:var(--accent-text)}
  .count{font-family:var(--font-mono);font-size:.75rem;color:var(--text-2)}
  .grow{flex:1}
  #q{font-family:var(--font-sans);font-size:.95rem;background:var(--surface);color:var(--text);
    border:1px solid var(--border);border-radius:var(--radius);padding:.55rem .85rem;width:min(320px,42vw)}
  .btn{font-family:var(--font-sans);font-weight:600;font-size:.8rem;cursor:pointer;background:var(--surface);
    color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem .75rem;display:inline-flex;align-items:center;gap:.4rem}
  .btn:hover{border-color:var(--accent-c)}
  .kbd{font-family:var(--font-mono);font-size:.75rem;background:var(--surface-2);border:1px solid var(--border);
    border-radius:4px;padding:.05rem .3rem;color:var(--text-2)}
  .about{max-width:var(--maxw);margin:.4rem auto 0;font-size:.82rem;color:var(--text-2)}
  .wrap{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:230px 1fr;gap:1.5rem;padding:1.5rem}
  @media(max-width:760px){.wrap{grid-template-columns:1fr;min-width:0} nav{position:static;min-width:0} main{min-width:0} .navh{display:none}
    #nav{display:flex;gap:.4rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.1rem 0 .6rem}
    .dom{flex:0 0 auto;white-space:nowrap;border:1px solid var(--border)}}
  nav{align-self:start;position:sticky;top:84px}
  .navh{font-family:var(--font-sans);font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:.78rem;color:var(--text-2);margin:0 0 .5rem .4rem}
  .dom{font-family:var(--font-sans);font-size:.85rem;display:flex;justify-content:space-between;gap:.5rem;
    padding:.4rem .55rem;border-radius:6px;cursor:pointer;color:var(--text)}
  .dom:hover{background:var(--surface-2)} .dom.on{background:var(--accent-c);color:#fff}
  .dom .n{font-family:var(--font-mono);font-size:.75rem;opacity:.8}
  .grid{display:grid;gap:var(--gap);grid-template-columns:repeat(auto-fill,minmax(280px,1fr));align-content:start}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:var(--pad-card);
    cursor:pointer;display:flex;flex-direction:column;gap:var(--row);content-visibility:auto;contain-intrinsic-size:auto 180px;transition:border-color .15s,transform .15s,box-shadow .15s}
  .card:hover,.card:focus-visible{border-color:var(--accent-c);transform:translateY(-2px);box-shadow:var(--shadow)}
  .eyebrow{font-family:var(--font-sans);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:.75rem;color:var(--accent-text)}
  .card h3{font-family:var(--font-sans);font-weight:700;font-size:1.12rem;line-height:1.2}
  .replaces{font-size:.8rem;color:var(--text-2);font-style:italic}
  .summary{font-size:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .meta{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:auto}
  .badge{font-family:var(--font-sans);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;
    padding:.18rem .45rem;border-radius:4px;background:var(--badge-bg);color:var(--badge-fg)}
  .pill{font-family:var(--font-mono);font-size:.75rem;color:var(--text-2);border:1px solid var(--border);border-radius:20px;padding:.1rem .5rem}
  .empty{font-family:var(--font-sans);color:var(--text-2);padding:3rem 1rem;text-align:center;grid-column:1/-1}
  .empty h3{font-weight:700;color:var(--text);margin-bottom:.4rem}
  /* skeleton */
  .skel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:var(--pad-card);height:172px;overflow:hidden}
  .shimmer{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 37%,var(--surface-2) 63%);
    background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:5px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .sk-l{height:.6rem;margin:.5rem 0} .sk-l.w40{width:40%} .sk-l.w70{width:70%} .sk-l.w90{width:90%}
  /* banner */
  .banner{grid-column:1/-1;border:1px solid var(--accent-c);background:var(--surface-2);border-radius:var(--radius);
    padding:.9rem 1.1rem;font-family:var(--font-sans);font-size:1rem}
  /* drawer */
  .scrim{position:fixed;inset:0;background:#14141366;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--bg);border-left:1px solid var(--border);
    transform:translateX(100%);transition:transform .22s;z-index:10;overflow-y:auto;padding:1.5rem 1.6rem 3rem}
  .drawer.on{transform:translateX(0)}
  .drawer .x{float:right;font-family:var(--font-sans);font-weight:700;cursor:pointer;border:1px solid var(--border);
    border-radius:6px;padding:.2rem .55rem;background:var(--surface);color:var(--text)}
  .drawer h2{font-family:var(--font-sans);font-weight:700;font-size:1.5rem;line-height:1.15;margin:.2rem 0 .3rem}
  .d-eyebrow{font-family:var(--font-sans);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:.78rem;color:var(--accent-text)}
  .sec{font-family:var(--font-sans);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:.78rem;color:var(--text-2);
    border-bottom:1px solid var(--border);padding-bottom:.3rem;margin:1.4rem 0 .6rem}
  .inp{margin:.4rem 0} .inp b{font-family:var(--font-sans);font-size:.82rem} .inp span{color:var(--text-2);font-size:.85rem}
  .rules{font-size:.92rem;background:var(--surface-2);border-radius:var(--radius);padding:.8rem .9rem;white-space:pre-wrap}
  .rel{display:flex;flex-direction:column;gap:.35rem}
  .rel a{font-family:var(--font-sans);font-size:.85rem;border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;display:flex;gap:.5rem}
  .rel a .rid{font-family:var(--font-mono);font-size:.78rem;color:var(--text-2)}
  .copy{font-family:var(--font-sans);font-weight:600;font-size:.85rem;cursor:pointer;background:var(--slate-dark);
    color:var(--ivory-light);border:1px solid transparent;border-radius:var(--radius);padding:.55rem 1rem;margin-top:1.2rem}
  html[data-theme="dark"] .copy{background:var(--ivory-light);color:var(--slate-dark)}
  /* command palette */
  .pal{position:fixed;inset:0;z-index:20;display:none;align-items:flex-start;justify-content:center;background:#14141355}
  .pal.on{display:flex}
  .pal-box{margin-top:12vh;width:min(620px,94vw);background:var(--bg);border:1px solid var(--border);border-radius:12px;
    box-shadow:var(--shadow);overflow:hidden}
  .pal-in{width:100%;border:0;border-bottom:1px solid var(--border);background:transparent;color:var(--text);
    font-family:var(--font-sans);font-size:1.05rem;padding:1rem 1.1rem;outline:none}
  .pal-list{max-height:48vh;overflow-y:auto;padding:.4rem}
  .pal-it{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-radius:8px;cursor:pointer;font-family:var(--font-sans);font-size:.92rem}
  .pal-it .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pal-it .d{font-family:var(--font-mono);font-size:.68rem;color:var(--text-2)}
  .pal-it.sel{background:var(--accent-c);color:#fff} .pal-it.sel .d{color:#fff;opacity:.85}
  .pal-it .ic{font-size:.8rem;opacity:.7}
  .pal-empty{padding:1.2rem;color:var(--text-2);font-family:var(--font-sans);font-size:1rem}
  /* toast */
  .toast{position:fixed;left:50%;bottom:2rem;transform:translateX(-50%) translateY(260%);background:var(--slate-dark);
    color:var(--ivory-light);font-family:var(--font-sans);font-weight:600;font-size:.85rem;padding:.7rem 1.1rem;
    border-radius:var(--radius);box-shadow:var(--shadow);z-index:30;transition:transform .25s;max-width:90vw}
  .toast.on{transform:translateX(-50%) translateY(0)}
  footer{max-width:var(--maxw);margin:0 auto;padding:1.5rem;border-top:1px solid var(--border);color:var(--text-2);font-size:.78rem}
</style>
</head>
<body>
<header id="hdr">
  <div class="mast">
    <span class="brand">Prompt<b>OS</b> Console</span>
    <span class="count" id="count"></span>
    <span class="grow"></span>
    <input id="q" type="search" placeholder="Search...  ( / )" autocomplete="off" aria-label="Search prompts">
    <button class="btn" id="palBtn" title="Command palette">Commands <span class="kbd">Ctrl K</span></button>
    <button class="btn" id="densBtn" title="Toggle density (D)">Comfortable</button>
    <button class="btn" id="themeBtn" title="Toggle theme (T)">Dark</button>
  </div>
  <div class="about">Librarian selects &middot; Gate enforces &middot; Ledger accumulates &mdash; <span id="about-n"></span> prompts. <span class="kbd">Ctrl K</span> palette &middot; <span class="kbd">/</span> search &middot; <span class="kbd">T</span> theme &middot; <span class="kbd">?</span> help.</div>
</header>
<div class="wrap" id="main">
  <nav><div class="navh">Domains</div><div id="nav"></div></nav>

</div>

<div class="scrim" id="scrim"></div>

<div class="pal" id="pal" role="dialog" aria-modal="true" aria-label="Command palette">
  <div class="pal-box">
    <input class="pal-in" id="palIn" type="text" placeholder="Type a command or search prompts..." autocomplete="off" role="combobox" aria-expanded="true" aria-controls="palList" aria-label="Command palette search">

  </div>
</div>
<div class="hlp" id="help" role="dialog" aria-modal="true" aria-label="Help" hidden>
  <div class="hlp-box">
    <div class="hlp-h"><span>PromptOS Console — Help</span><button class="btn" id="helpClose" aria-label="Close help">Esc</button></div>
    <div id="helpBody"></div>
  </div>
</div>
<style>
  .hlp{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#1414138c}

  .hlp p,.hlp li{font-size:var(--fs-md);color:var(--text-2);line-height:1.5}
  .hlp ul{margin:0;padding-left:1.1rem} .hlp li{margin:.2rem 0}
  .hlp .row{display:flex;justify-content:space-between;gap:1rem;padding:.18rem 0;font-size:var(--fs-md)}
</style>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

    $("grid").addEventListener("keydown",(e)=>{ if(e.key!=="Enter"&&e.key!==" ") return; const c=e.target.closest(".card[data-id]"); if(c){ e.preventDefault(); openDetail(c.getAttribute("data-id")); } });
    $("nav").addEventListener("click",(e)=>{ const d=e.target.closest(".dom[data-d]"); if(d){ S.dom=d.getAttribute("data-d"); render(); writeHash(); } });
    $("nav").addEventListener("keydown",(e)=>{ if(e.key!=="Enter"&&e.key!==" ") return; const d=e.target.closest(".dom[data-d]"); if(d){ e.preventDefault(); S.dom=d.getAttribute("data-d"); render(); writeHash(); } });
    $("palList").addEventListener("mousemove",(e)=>{ const it=e.target.closest(".pal-it[data-i]"); if(it){ S.palSel=+it.getAttribute("data-i"); paintSel(); } });
    $("palList").addEventListener("click",(e)=>{ const it=e.target.closest(".pal-it[data-i]"); if(it) runPal(+it.getAttribute("data-i")); });
    $("drawer").addEventListener("click",(e)=>{ if(e.target.closest("#closeBtn")){ closeDetail(); return; } const rel=e.target.closest("[data-rel]"); if(rel){ e.preventDefault(); openDetail(rel.getAttribute("data-rel")); return; } if(e.target.closest("#copyBtn")){ const p=S.prompts.find(x=>x.id===S.curId); if(p) copyText(asMarkdown(p),"Prompt copied as Markdown"); } });
    $("scrim").addEventListener("click",closeDetail);
    $("pal").addEventListener("click",(e)=>{ if(e.target===$("pal")) closePal(); });
    { const h=$("help"); if(h) h.addEventListener("click",(e)=>{ if(e.target===h||e.target.closest("#helpClose")) closeHelp(); }); }
    if(!LS.get("pos.seenhelp",null)){ LS.set("pos.seenhelp","1"); setTimeout(()=>{ try{ toast("New here? Press ? for help"); }catch(e){} },900); }
    document.addEventListener("keydown",onKey);
    window.addEventListener("hashchange",applyHash);
    let ticking=false;
    window.addEventListener("scroll",()=>{ if(ticking) return; ticking=true; requestAnimationFrame(()=>{ $("hdr").classList.toggle("stuck",window.scrollY>8); ticking=false; }); });
    // drag-drop a catalog json
    window.addEventListener("dragover",(e)=>{ e.preventDefault(); });
    window.addEventListener("drop",(e)=>{ e.preventDefault(); const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]; if(!f) return;
      const r=new FileReader(); r.onload=()=>{ try{ _load(JSON.parse(r.result)); toast("Loaded "+f.name); }catch(err){ S.state="error"; render(); toast("Invalid JSON"); } }; r.readAsText(f); });
    // brief skeleton, then content (skipped under reduced motion)
    let reduce=false; try{ reduce=matchMedia("(prefers-reduced-motion: reduce)").matches; }catch(e){}
    if(reduce){ _load(DATA); applyHash(); }
    else { S.state="loading"; render(); setTimeout(()=>{ _load(DATA); applyHash(); }, 280); }
  }
  return { init, _load, asMarkdown, _domains:domains, _commands:commands };
})();
try{ document.addEventListener("DOMContentLoaded", App.init); }catch(e){}
globalThis.__APP = App;
</script>
